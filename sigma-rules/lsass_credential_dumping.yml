title: LSASS Memory Access - Credential Dumping
id: a1b2c3d4-3333-4e5f-8a9b-000000000003
status: experimental
description: Detects processes accessing lsass.exe memory, a common technique for credential dumping tools like Mimikatz.
references:
    - https://attack.mitre.org/techniques/T1003/001/
author: Swetha Nyamala
date: 2026/06/25
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    product: windows
    category: process_access
detection:
    selection:
        TargetImage|endswith: '\lsass.exe'
    filter:
        SourceImage|endswith:
            - '\MsMpEng.exe'
            - '\svchost.exe'
    condition: selection and not filter
falsepositives:
    - Legitimate security/AV tools accessing LSASS
level: critical